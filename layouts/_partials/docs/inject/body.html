{{/* Scroll to and highlight the passage a search result linked to (?hl=...) */}}
<script>
  (function () {
    var params = new URLSearchParams(window.location.search);
    var needle = params.get('hl');
    if (!needle) {
      return;
    }

    function run() {
      var container = document.querySelector('.book-article') || document.body;
      var walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
      var node;
      while ((node = walker.nextNode())) {
        var idx = node.nodeValue.indexOf(needle);
        if (idx < 0) {
          continue;
        }

        var range = document.createRange();
        range.setStart(node, idx);
        range.setEnd(node, idx + needle.length);

        var mark = document.createElement('mark');
        mark.className = 'search-highlight';
        try {
          range.surroundContents(mark);
        } catch (e) {
          // Phrase spans multiple nodes; fall back to highlighting the block.
          var block = node.parentElement;
          if (!block) {
            return;
          }
          block.classList.add('search-highlight');
          mark = block;
        }

        mark.scrollIntoView({ block: 'center', behavior: 'smooth' });
        setTimeout(function () {
          mark.classList.add('search-highlight--fade');
        }, 1600);

        // Clean the URL so a refresh doesn't re-trigger the highlight.
        var url = window.location.pathname + window.location.hash;
        window.history.replaceState(null, '', url);
        return;
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', run);
    } else {
      run();
    }
  })();
</script>
